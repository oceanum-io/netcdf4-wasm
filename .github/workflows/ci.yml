name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: |
          npm ci || {
            echo "::group::npm debug log"
            tail -n 250 ~/.npm/_logs/*-debug-0.log || true
            echo "::endgroup::"
            exit 1
          }
      - run: npm test

  build:
    name: Typecheck + JS bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: |
          npm ci || {
            echo "::group::npm debug log"
            tail -n 250 ~/.npm/_logs/*-debug-0.log || true
            echo "::endgroup::"
            exit 1
          }
      - run: npm run typecheck
      # Compile the TS API and roll up the browser bundles. This does not need
      # the WASM binary (it is loaded at runtime), so it verifies the JS build
      # on every PR cheaply. The heavy WASM build is in wasm-build.yml.
      - run: npm run build:js
      - run: npm run build:umd
