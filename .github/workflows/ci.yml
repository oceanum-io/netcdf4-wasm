name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Diagnostics
        run: |
          node --version
          npm --version
          free -h || true
      - name: Install dependencies
        run: |
          npm ci; echo "npm ci raw exit code: $?"
          echo "jest present:"; ls node_modules/.bin/jest 2>&1 || echo "JEST MISSING"
      - name: Show npm debug log
        if: always()
        run: |
          echo "::group::npm debug logs"
          tail -n 300 ~/.npm/_logs/*-debug-0.log 2>&1 || true
          echo "::endgroup::"
      - run: npm test

  build:
    name: Typecheck + JS bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Show npm debug log
        if: failure()
        run: |
          echo "::group::npm debug logs"
          tail -n 300 ~/.npm/_logs/*-debug-0.log || true
          echo "::endgroup::"
      - run: npm run typecheck
      # Compile the TS API and roll up the browser bundles. This does not need
      # the WASM binary (it is loaded at runtime), so it verifies the JS build
      # on every PR cheaply. The heavy WASM build is in wasm-build.yml.
      - run: npm run build:js
      - run: npm run build:umd
