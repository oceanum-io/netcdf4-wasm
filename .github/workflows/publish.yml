name: Publish to npm

# Publish on a version tag, e.g. `git tag v0.2.0 && git push origin v0.2.0`.
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN needed and it bypasses 2FA.
# Requires a Trusted Publisher configured for this package on npmjs.com (linked
# to this repo + this workflow), npm CLI >= 11.5.1, and Node >= 22.14.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Trusted publishing needs npm >= 11.5.1; ensure it regardless of the
      # version bundled with the Node release.
      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version: $TAG_VERSION / package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm test

      - name: Build WASM module
        uses: ./.github/actions/build-wasm

      - name: Build JS + bundles
        run: |
          npm run build:js
          npm run build:umd

      # Tokenless OIDC publish. Provenance is generated automatically under
      # trusted publishing, so no --provenance flag and no NODE_AUTH_TOKEN.
      # --ignore-scripts skips prepublishOnly (`clean` would wipe the artifacts
      # built above); the package is already fully built here.
      - name: Publish
        run: npm publish --access public --ignore-scripts
